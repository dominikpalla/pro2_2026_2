<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${user.id == 0 ? 'Create New User' : 'Edit the User'}"></title>
</head>
<body>
<h1 th:text="${user.id == 0 ? 'Create New User' : 'Edit the User'}"></h1>
<a th:href="@{/users/}">Back to List of Users</a><br><br>

<form method="post" th:action="@{/users/save}" th:object="${user}">
    <input type="hidden" th:field="*{id}">
    Name: <input type="text" th:field="*{name}"><br>
    Username: <input type="text" th:field="*{username}"><br>
    Password: <input type="password" th:field="*{password}"><br>
    Role: <select>
    <option value="USER">User</option>
    <option value="ADMIN">Admin</option>
    </select><br>
    Email: <input type="text" th:field="*{email}"><br>
    <input type="submit" value="Save">
</form>

</body>
</html>
